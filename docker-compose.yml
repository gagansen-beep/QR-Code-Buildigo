version: '3.9'

services:
  postgres:
    image: postgres:16-alpine
    container_name: buildigo_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: Buildigo
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres_dev_password
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: buildigo_api
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: production
      PORT: 3000
      API_PREFIX: /api
      APP_NAME: Buildigo
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: Buildigo
      DB_USER: postgres
      DB_PASSWORD: postgres_dev_password
      DB_POOL_MIN: 2
      DB_POOL_MAX: 20
      DB_SSL: "false"
      JWT_ACCESS_SECRET: change_this_to_a_secure_random_string_min_32_chars
      JWT_REFRESH_SECRET: change_this_to_another_secure_random_string_32_chars
      JWT_ACCESS_EXPIRY: 15m
      JWT_REFRESH_EXPIRY: 7d
      CORS_ORIGINS: http://localhost:3001,http://localhost:3002,http://localhost:3003
      RATE_LIMIT_WINDOW_MS: "60000"
      RATE_LIMIT_MAX_REQUESTS: "100"
      AUTH_RATE_LIMIT_MAX: "5"
      STORAGE_BASE_PATH: /app/uploads
      MAX_FILE_SIZE_MB: "10"
      LOG_LEVEL: info
      ADMIN_EMAIL: admin@buildigo.in
      ADMIN_PASSWORD: Admin@123456
      ADMIN_NAME: Super Admin
    volumes:
      - uploads:/app/uploads

volumes:
  pgdata:
    driver: local
  uploads:
    driver: local
