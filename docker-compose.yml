version: '3.9'

services:
  postgres:
    image: postgres:16-alpine
    container_name: qrcode_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME:-QRCode}
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-changeme}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: qrcode_backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: 3005
      API_PREFIX: /api
      APP_NAME: QRCode
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: ${DB_NAME:-QRCode}
      DB_USER: ${DB_USER:-postgres}
      DB_PASSWORD: ${DB_PASSWORD:-changeme}
      DB_POOL_MIN: 2
      DB_POOL_MAX: 20
      DB_SSL: "false"
      CORS_ORIGINS: ${CORS_ORIGINS:-https://qr.buildigo.org,http://localhost}
      RATE_LIMIT_WINDOW_MS: "60000"
      RATE_LIMIT_MAX_REQUESTS: "200"
      STORAGE_BASE_PATH: /app/uploads
      MAX_FILE_SIZE_MB: "10"
      LOG_LEVEL: info
      FRONTEND_URL: ${FRONTEND_URL:-https://qr.buildigo.org}
      ADMIN_EMAIL: ${ADMIN_EMAIL:-admin@example.com}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-changeme}
    volumes:
      - uploads:/app/uploads
    expose:
      - "3005"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: qrcode_frontend
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  pgdata:
    driver: local
  uploads:
    driver: local
