version: '3.9'

services:
  postgres:
    image: postgres:16-alpine
    container_name: qrcode_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: QRCode
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres_dev_password
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: qrcode_api
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "3005:3005"
    environment:
      NODE_ENV: production
      PORT: 3005
      API_PREFIX: /api
      APP_NAME: QRCode
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: QRCode
      DB_USER: postgres
      DB_PASSWORD: postgres_dev_password
      DB_POOL_MIN: 2
      DB_POOL_MAX: 20
      DB_SSL: "false"
      CORS_ORIGINS: http://localhost:5173
      RATE_LIMIT_WINDOW_MS: "60000"
      RATE_LIMIT_MAX_REQUESTS: "200"
      STORAGE_BASE_PATH: /app/uploads
      MAX_FILE_SIZE_MB: "10"
      LOG_LEVEL: info
      FRONTEND_URL: http://localhost:5173
      ADMIN_EMAIL: admin@example.com
      ADMIN_PASSWORD: change_this_password
    volumes:
      - uploads:/app/uploads

volumes:
  pgdata:
    driver: local
  uploads:
    driver: local
